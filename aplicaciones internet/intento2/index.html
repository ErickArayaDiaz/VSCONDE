<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego de Memoria</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <h1>Juego de Memoria</h1>

  <div id="niveles">

    <!-- Pantalla Nivel 1 -->
    <div class="nivel pantalla activa" id="nivel1">
      <h2>Nivel 1</h2>
      <div class="fila fila1">
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>10</button>
      </div>
      <p class="tiempo" id="tiempo1">⏱ Tiempo: 0 s</p>
      <button class="reset" data-fila="fila1">🔄 Reset</button>
      <div class="nav">
        <button class="next">➡ Siguiente</button>
      </div>
    </div>

    <!-- Pantalla Nivel 2 -->
    <div class="nivel pantalla" id="nivel2">

      <div class="nav">
        <button class="prev">⬅ Anterior</button>
        <button class="next">➡ Siguiente</button>
      </div>
    </div>

  <script src="app.js"></script>
