<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mini Postman en HTML5</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Mini Postman</h1>

  <label for="method">Método:</label>
  <select id="method">
    <option>GET</option>
    <option>POST</option>
    <option>PUT</option>
    <option>DELETE</option>
  </select>

  <label for="url">URL:</label>
  <input type="text" id="url" placeholder="https://api.ejemplo.com/endpoint">

  <label for="headers">Headers (key:value por línea):</label>
  <textarea id="headers"></textarea>

  <label for="body">Body (JSON para POST/PUT):</label>
  <textarea id="body"></textarea>

  <button id="sendBtn">Enviar</button>

  <h2>Respuesta</h2>
  <pre id="response"></pre>

  <script src="app.js"></script>
</body>
</html>
